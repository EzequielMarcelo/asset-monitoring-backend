services:
  api:
    build: .
    container_name: asset-monitoring-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db

  db:
    image: postgres:17
    container_name: asset-monitoring-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: asset_monitoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: